.hero:before{content:"";position:absolute;inset:-50%;background:conic-gradient(from 160deg,transparent,#ff4f8888,#7c5cff88,#49e6d888,transparent);animation:spin 9s linear infinite;opacity:.28}.hero>*{position:relative}.shine{position:absolute;inset:0;background:linear-gradient(110deg,transparent 0 35%,rgba(255,255,255,.18) 45%,transparent 56%);animation:sweep 4.6s ease-in-out infinite}.topbar{display:flex;justify-content:space-between;align-items:center}.pill,.chip{border:1px solid var(--line);background:rgba(255,255,255,.12);border-radius:999px;padding:9px 13px;font-weight:750;font-size:13px;box-shadow:inset 0 1px rgba(255,255,255,.12)}

main{padding:0 12px}.search-card,.progress-card{border:1px solid var(--line);background:rgba(10,10,20,.55);backdrop-filter:blur(18px);border-radius:28px;padding:14px;margin:12px 0;box-shadow:0 16px 40px rgba(0,0,0,.22)}.search-row{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.10);border-radius:20px;padding:12px}input,select{font:inherit;color:white;background:rgba(255,255,255,.10);border:1px solid var(--line);border-radius:16px;padding:13px;width:100%;outline:none}input::placeholder{color:rgba(255,255,255,.45)}.search-row input{border:0;background:transparent;padding:0}.filters{display:flex;gap:8px;margin:12px 0;overflow:auto;padding-bottom:2px}.chip{color:white;border:0;white-space:nowrap}.chip.active{background:linear-gradient(135deg,var(--pink),var(--violet));}.progress-card{display:flex;align-items:center;gap:14px}.progress-card strong{font-size:22px}.progress-card span{color:var(--muted)}.progress{height:12px;flex:1;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}.progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--green),var(--yellow));border-radius:inherit;transition:width .3s ease}.list{display:grid;gap:10px}.item{position:relative;display:grid;grid-template-columns:46px 1fr auto;gap:12px;align-items:center;padding:13px;border-radius:24px;background:rgba(255,255,255,.095);border:1px solid var(--line);box-shadow:0 12px 28px rgba(0,0,0,.18);animation:pop .18s ease}.item.bought{opacity:.66}.check{width:42px;height:42px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.08);display:grid;place-items:center;font-size:22px}.bought .check{background:linear-gradient(135deg,var(--green),var(--cyan));color:#06231f}.meta{min-width:0}.name{font-weight:800;line-height:1.1}.bought .name{text-decoration:line-through;text-decoration-thickness:2px;color:rgba(255,255,255,.63)}.cat{display:inline-flex;margin-top:7px;font-size:11px;font-weight:850;letter-spacing:.3px;color:#100d1b;background:linear-gradient(90deg,var(--yellow),#fff);padding:5px 8px;border-radius:999px}.price{text-align:right;font-weight:900}.qty{display:block;color:var(--muted);font-size:12px;margin-top:4px}.empty{text-align:center;color:var(--muted);padding:30px 18px}.hidden{display:none!important}.fab{position:fixed;right:max(18px,env(safe-area-inset-right));bottom:calc(18px + env(safe-area-inset-bottom));width:68px;height:68px;border:0;border-radius:25px;background:linear-gradient(145deg,var(--pink),var(--violet));color:white;font-size:38px;box-shadow:0 18px 55px rgba(124,92,255,.45);z-index:5}dialog{border:0;padding:0;background:transparent;width:min(520px,100%);max-width:none;margin:auto auto 0;color:white}dialog::backdrop{background:rgba(0,0,0,.55);backdrop-filter:blur(8px)}.sheet{background:#171526;border:1px solid var(--line);border-radius:30px 30px 0 0;padding:12px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:var(--shadow)}.sheet-handle{width:48px;height:5px;border-radius:99px;background:rgba(255,255,255,.24);margin:0 auto 13px}.sheet h2{margin:0 0 12px;font-size:27px;letter-spacing:-.8px}.sheet label{display:block;color:var(--muted);font-size:13px;margin:12px 0}.sheet label input,.sheet label select{margin-top:7px}.two-cols{display:grid;grid-template-columns:1.45fr .75fr;gap:10px}.toggle{display:flex!important;align-items:center;gap:10px;background:rgba(255,255,255,.08);padding:12px;border-radius:18px}.toggle input{width:24px;height:24px;margin:0}.sheet menu{display:flex;gap:9px;justify-content:flex-end;padding:0;margin:16px 0 0}.sheet button{border:0;border-radius:16px;padding:13px 16px;font-weight:850;color:white}.save{background:linear-gradient(135deg,var(--pink),var(--violet))}.ghost-dark{background:rgba(255,255,255,.10)}.danger{background:#ef4444;margin-right:auto}@keyframes spin{to{transform:rotate(1turn)}}@keyframes sweep{0%,55%{transform:translateX(-80%)}100%{transform:translateX(90%)}}@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}@media (max-width:380px){h1{font-size:40px}.stats-grid{grid-template-columns:1fr}.stat strong{font-size:24px}.hero{border-radius:26px}}

<body>
  <div class="phone-shell">
    <header class="hero">
      <div class="shine"></div>
      <div class="topbar">
        <span class="pill">🏠 Casa nuova</span>
        <button id="resetBtn" class="ghost" aria-label="Importa lista acquisti originale">↺</button>
      </div>
      <h1>Spese casa<br><span>senza ansia.</span></h1>
      <p class="subtitle">Lista acquisti smart, pensata per iPhone e uso veloce al supermercato.</p>
      <span id="syncStatus" class="sync-status">☁️ Sincronizzazione…</span>
      <section class="stats-grid" aria-label="Riepilogo spese">
        <article class="stat primary"><small>Totale</small><strong id="totalAll">€0</strong></article>
        <article class="stat"><small>Comprato</small><strong id="totalBought">€0</strong></article>
        <article class="stat"><small>Da comprare</small><strong id="totalTodo">€0</strong></article>
      </section>
    </header>

    <main>
      <div class="search-card">
        <div class="search-row">
          <span>🔎</span>
          <input id="searchInput" placeholder="Cerca acquisto, categoria…" autocomplete="off">
        </div>
        <div class="filters" id="statusFilters">
          <button class="chip active" data-status="all">Tutto</button>
          <button class="chip" data-status="todo">Da comprare</button>
          <button class="chip" data-status="bought">Comprati</button>
        </div>
        <select id="categorySelect" aria-label="Filtra categoria"></select>
        <button id="addInlineBtn" type="button" class="add-primary">＋ Aggiungi acquisto</button>
      </div>

      <div class="progress-card">
        <div><strong id="progressText">0%</strong><span> completato</span></div>
        <div class="progress"><i id="progressBar"></i></div>
      </div>

      <section id="list" class="list" aria-live="polite"></section>
      <p id="emptyState" class="empty hidden">Nessun acquisto trovato. Prova a cambiare filtro o aggiungine uno nuovo ✨</p>
    </main>
  </div>

  <button id="addBtn" type="button" class="fab" aria-label="Aggiungi acquisto">＋</button>

  <dialog id="itemDialog">
    <form id="itemForm" method="dialog" class="sheet">
      <div class="sheet-handle"></div>
      <h2 id="dialogTitle">Nuovo acquisto</h2>
      <label>Descrizione<input id="nameField" required placeholder="Es. Stendino, detersivo, lampada…"></label>
      <div class="two-cols">
        <label>Categoria<select id="categoryField"></select></label>
        <label>Quantità<input id="qtyField" type="number" min="1" step="1" value="1"></label>
      </div>
      <label>Prezzo unitario<input id="priceField" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0,00"></label>
      <label>Note<input id="notesField" placeholder="Negozio, marca, misura…"></label>
      <label class="toggle"><input id="boughtField" type="checkbox"><span>Già comprato</span></label>
      <menu>
        <button type="button" id="deleteBtn" class="danger hidden">Elimina</button>
        <button type="button" id="cancelBtn" class="ghost-dark">Annulla</button>
        <button value="default" class="save">Salva</button>
      </menu>
    </form>
  </dialog>

// Versione sincronizzata Google Sheets via JSONP, fix CORS Safari/GitHub Pages.
// Fix cache vecchia versione GitHub Pages / iPhone: pulisce service worker cache-first precedente.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister())).catch(()=>{});
}
if ('caches' in window) {
  caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(()=>{});
}

const API_URL = 'https://script.google.com/macros/s/AKfycbxm7vwItC8YWVQwsP6re4txZnCWfm071qzQwJk5vBlhG17aLLs2xxiBubGwyNQqecp-HA/exec';
const STORAGE_KEY = 'spese-casa-nuova-sheets-cache-v1';
let items = loadCache();
let activeStatus = 'all';
let editingId = null;
let isSyncing = false;
const moneyFormatter = new Intl.NumberFormat('it-IT', {style:'currency', currency:'EUR'});
const $ = s => document.querySelector(s);
const list = $('#list');
const categorySelect = $('#categorySelect');
const categoryField = $('#categoryField');

function loadCache(){
  try {
    const cached = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return Array.isArray(cached) && cached.length ? cached : window.INITIAL_ITEMS.map(normalizeInitial);
  } catch {
    return window.INITIAL_ITEMS.map(normalizeInitial);
  }
}
function saveCache(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
function normalizeInitial(i){ return { id:String(i.id), name:i.name||'', category:i.category||'ALTRO', qty:Number(i.qty||1), price:Number(i.price||0), notes:i.notes||'', bought:!!i.bought }; }
function fromSheet(row){ return { id:String(row.id), name:row.descrizione||'', category:row.categoria||'ALTRO', qty:Number(row.quantita||1), price:Number(row.prezzo||0), notes:row.note||'', bought:!!row.comprato, data:row.data||'' }; }
function toSheet(item){ return { id:String(item.id||''), descrizione:item.name||'', categoria:item.category||'ALTRO', quantita:Number(item.qty||1), prezzo:Number(item.price||0), comprato:!!item.bought, data:item.data||new Date().toISOString(), note:item.notes||'' }; }
function setSyncStatus(text, ok=true){
  let el = $('#syncStatus');
  if (!el) return;
  el.textContent = text;
  el.classList.toggle('offline', !ok);
}
// Apps Script non gestisce sempre bene CORS/POST da GitHub Pages su Safari/iPhone.
// Questa versione usa JSONP via <script>, quindi funziona anche cross-origin.
function jsonpRequest(action, payload = {}){
  return new Promise((resolve, reject) => {
    const callbackName = `speseCasaCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout Google Sheets'));
    }, 15000);

    function cleanup(){
      clearTimeout(timeout);
      delete window[callbackName];
      script.remove();
    }

    window[callbackName] = data => {
      cleanup();
      resolve(data);
    };

    const url = new URL(API_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('t', String(Date.now()));
    if (Object.keys(payload).length) {
      url.searchParams.set('payload', JSON.stringify(payload));
    }

    script.onerror = () => {
      cleanup();
      reject(new Error('Errore caricamento Google Apps Script'));
    };
    script.src = url.toString();
    document.body.appendChild(script);
  });
}
async function apiList(){
  return jsonpRequest('list');
}
async function apiPost(action, body){
  return jsonpRequest(action, body);
}
async function syncLoad(){
  try {
    setSyncStatus('☁️ Sincronizzazione…', true);
    const data = await apiList();
    if (!data.ok) throw new Error(data.error || 'Risposta non valida');
    items = (data.items || []).map(fromSheet);
    await autoSeedMissingInitialItems();
    saveCache();
    render();
    setSyncStatus('☁️ Sincronizzato con Google Sheets', true);
  } catch (err) {
    console.error(err);
    setSyncStatus('⚠️ Offline o autorizzazione Google non completa', false);
  }
}
async function syncAdd(payload){
  const data = await apiPost('add', { item: toSheet(payload) });
  if (!data.ok) throw new Error(data.error || 'Aggiunta non riuscita');
  return fromSheet(data.item);
}
async function syncUpdate(payload){
  const data = await apiPost('update', { item: toSheet(payload) });
  if (!data.ok) throw new Error(data.error || 'Aggiornamento non riuscito');
  return payload;
}
async function syncDelete(id){
  const data = await apiPost('delete', { id:String(id) });
  if (!data.ok) throw new Error(data.error || 'Eliminazione non riuscita');
}

function normalizeKey(value){
  return String(value || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ');
}
function itemKey(item){
  return normalizeKey(item.name) + '|' + normalizeKey(item.category || 'ALTRO');
}

async function autoSeedMissingInitialItems(){
  const initial = window.INITIAL_ITEMS.map(normalizeInitial);
  const existing = new Set(items.map(itemKey));
  const missing = initial.filter(i => !existing.has(itemKey(i)));
  if (!missing.length) return;
  setSyncStatus(`☁️ Importo ${missing.length} elementi iniziali…`, true);
  for (const original of missing) {
    try {
      const saved = await syncAdd({
        ...original,
        id: '',
        data: new Date().toISOString()
      });
      items.push(saved);
      existing.add(itemKey(saved));
    } catch (err) {
      console.error('Auto import non riuscito per', original, err);
      throw err;
    }
  }
}

async function importMissingInitialItems(){
  if (isSyncing) return;
  const initial = window.INITIAL_ITEMS.map(normalizeInitial);
  const existing = new Set(items.map(itemKey));
  const missing = initial.filter(i => !existing.has(itemKey(i)));
  if (!missing.length) {
    alert('La lista originale del file Excel sembra già presente nel Google Sheet.');
    return;
  }
  const ok = confirm(`Vuoi importare nel Google Sheet ${missing.length} elementi del file Excel originale che mancano nella lista?`);
  if (!ok) return;
  isSyncing = true;
  setSyncStatus(`☁️ Importo ${missing.length} elementi dall’Excel…`, true);
  let addedCount = 0;
  try {
    for (const original of missing) {
      const saved = await syncAdd({
        ...original,
        id: '',
        data: new Date().toISOString()
      });
      items.push(saved);
      existing.add(itemKey(saved));
      addedCount++;
    }
    saveCache();
    render();
    setSyncStatus('☁️ Lista Excel importata e sincronizzata', true);
    alert(`Import completato: ${addedCount} elementi aggiunti al Google Sheet.`);
  } catch (err) {
    console.error(err);
    setSyncStatus('⚠️ Import Excel non completato', false);
    alert('Non sono riuscito a importare tutta la lista originale. Riprova tra poco o controlla Apps Script.');
  } finally {
    isSyncing = false;
  }
}

function allCategories(){ return [...new Set([...window.INITIAL_CATEGORIES, ...items.map(i=>i.category||'ALTRO')])].sort(); }
function total(i){ return (Number(i.qty)||1) * (Number(i.price)||0); }
function fmt(v){ return moneyFormatter.format(v || 0); }
function icon(cat){
  const c=(cat||'').toLowerCase();
  if(c.includes('supermercato')) return '🛒'; if(c.includes('bagno')) return '🚿'; if(c.includes('cucina')) return '🍳'; if(c.includes('bucato')) return '🧺';
  if(c.includes('pulizia')) return '🧽'; if(c.includes('personale')) return '🫧'; if(c.includes('camera')) return '🛏️';
  return '✨';
}
function renderFilters(){
  const cats = allCategories();
  const current = categorySelect.value || 'all';
  categorySelect.innerHTML = '<option value="all">Tutte le categorie</option>' + cats.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  categorySelect.value = cats.includes(current) ? current : 'all';
  categoryField.innerHTML = cats.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
}
function renderStats(){
  const all = items.reduce((s,i)=>s+total(i),0), bought=items.filter(i=>i.bought).reduce((s,i)=>s+total(i),0), todo=all-bought;
  $('#totalAll').textContent=fmt(all); $('#totalBought').textContent=fmt(bought); $('#totalTodo').textContent=fmt(todo);
  const pct = items.length ? Math.round(items.filter(i=>i.bought).length/items.length*100) : 0;
  $('#progressText').textContent = pct + '%'; $('#progressBar').style.width = pct + '%';
}
function filteredItems(){
  const q=$('#searchInput').value.trim().toLowerCase(); const cat=categorySelect.value;
  return items.filter(i => (activeStatus==='all' || (activeStatus==='todo'?!i.bought:i.bought))
    && (cat==='all' || i.category===cat)
    && (!q || `${i.name} ${i.category} ${i.notes||''}`.toLowerCase().includes(q)));
}
function render(){
  renderFilters(); renderStats(); const data=filteredItems();
  list.innerHTML = data.map(i=>`<article class="item ${i.bought?'bought':''}" data-id="${escapeHtml(i.id)}">
    <button class="check" data-action="toggle" aria-label="Segna come comprato">${i.bought?'✓':''}</button>
    <div class="meta" data-action="edit"><div class="name">${escapeHtml(i.name)}</div><span class="cat">${icon(i.category)} ${escapeHtml(i.category||'ALTRO')}</span></div>
    <div class="price" data-action="edit">${fmt(total(i))}<span class="qty">x${i.qty||1}</span></div>
  </article>`).join('');
  const empty = $('#emptyState');
  empty.classList.toggle('hidden', data.length>0);
  const q = $('#searchInput').value.trim();
  if (data.length === 0 && q) {
    empty.innerHTML = `Nessun acquisto trovato.<br><button type="button" class="quick-add" id="quickAddBtn">＋ Aggiungi “${escapeHtml(q)}”</button>`;
  } else {
    empty.textContent = 'Nessun acquisto trovato. Prova a cambiare filtro o aggiungine uno nuovo ✨';
  }
}
function openForm(id=null){
  editingId=id === null ? null : String(id);
  const typedName = $('#searchInput')?.value?.trim() || '';
  const item=items.find(i=>String(i.id)===editingId) || {name:typedName,category:'SUPERMERCATO',qty:1,price:'',notes:'',bought:false};
  $('#dialogTitle').textContent = id ? 'Modifica acquisto' : 'Nuovo acquisto';
  $('#nameField').value=item.name; categoryField.value=item.category || 'ALTRO'; $('#qtyField').value=item.qty||1; $('#priceField').value=item.price||''; $('#notesField').value=item.notes||''; $('#boughtField').checked=!!item.bought;
  $('#deleteBtn').classList.toggle('hidden', !id); $('#itemDialog').showModal(); setTimeout(()=>$('#nameField').focus(), 80);
}
function closeForm(){ $('#itemDialog').close(); editingId=null; }
async function upsertFromForm(){
  if (isSyncing) return;
  const payload={ id: editingId || '', name:$('#nameField').value.trim(), category:categoryField.value||'ALTRO', qty:Number($('#qtyField').value)||1, price:Number($('#priceField').value)||0, notes:$('#notesField').value.trim(), bought:$('#boughtField').checked, data:new Date().toISOString() };
  if(!payload.name) return;
  isSyncing = true;
  const saveBtn = $('.save');
  const oldText = saveBtn.textContent;
  saveBtn.textContent = 'Salvo…';
  try {
    if(editingId){
      await syncUpdate(payload);
      const target = items.find(i=>String(i.id)===String(editingId));
      Object.assign(target, payload);
    } else {
      const saved = await syncAdd(payload);
      items.unshift(saved);
      sparkle();
    }
    saveCache(); closeForm(); render(); setSyncStatus('☁️ Salvato e sincronizzato', true);
  } catch (err) {
    console.error(err);
    alert('Non sono riuscito a salvare su Google Sheets. Controlla il deploy Apps Script e i permessi.');
    setSyncStatus('⚠️ Salvataggio non riuscito', false);
  } finally {
    isSyncing = false;
    saveBtn.textContent = oldText;
  }
}
function sparkle(){
  for(let i=0;i<16;i++){ const s=document.createElement('i'); s.textContent=['✨','🏠','💸','🛒'][i%4]; s.style.cssText=`position:fixed;right:44px;bottom:76px;z-index:99;pointer-events:none;font-style:normal;font-size:22px;transition:transform .7s ease, opacity .7s ease;`; document.body.appendChild(s); requestAnimationFrame(()=>{s.style.transform=`translate(${(Math.random()-.5)*220}px,${-90-Math.random()*160}px) rotate(${Math.random()*180}deg)`; s.style.opacity=0;}); setTimeout(()=>s.remove(),760); }
}
function escapeHtml(str){ return String(str).replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }

$('#addBtn').addEventListener('click',()=>openForm());
$('#addInlineBtn').addEventListener('click',()=>openForm());
$('#emptyState').addEventListener('click', e=>{ if(e.target.closest('#quickAddBtn')) openForm(); });
$('#cancelBtn').addEventListener('click',closeForm);
$('#itemForm').addEventListener('submit', e=>{ e.preventDefault(); upsertFromForm(); });
$('#deleteBtn').addEventListener('click',async()=>{
  if(!editingId || isSyncing) return;
  if(!confirm('Eliminare questo acquisto?')) return;
  isSyncing = true;
  try { await syncDelete(editingId); items=items.filter(i=>String(i.id)!==String(editingId)); saveCache(); closeForm(); render(); setSyncStatus('☁️ Eliminato e sincronizzato', true); }
  catch(err){ console.error(err); alert('Non sono riuscito a eliminare da Google Sheets.'); setSyncStatus('⚠️ Eliminazione non riuscita', false); }
  finally { isSyncing = false; }
});
$('#searchInput').addEventListener('input',render); categorySelect.addEventListener('change',render);
$('#statusFilters').addEventListener('click',e=>{ const b=e.target.closest('button[data-status]'); if(!b) return; activeStatus=b.dataset.status; document.querySelectorAll('#statusFilters .chip').forEach(x=>x.classList.toggle('active',x===b)); render(); });
list.addEventListener('click',async e=>{
  const card=e.target.closest('.item'); if(!card) return; const id=String(card.dataset.id);
  if(e.target.closest('[data-action="toggle"]')){
    const item=items.find(i=>String(i.id)===id); if(!item) return;
    const previous = item.bought; item.bought=!item.bought; if(item.bought) sparkle(); render(); saveCache();
    try { await syncUpdate(item); setSyncStatus('☁️ Salvato e sincronizzato', true); }
    catch(err){ console.error(err); item.bought=previous; render(); saveCache(); alert('Non sono riuscito a sincronizzare la modifica.'); setSyncStatus('⚠️ Sincronizzazione non riuscita', false); }
  } else openForm(id);
});
$('#resetBtn').addEventListener('click', importMissingInitialItems);
render();
syncLoad();


  </script>
</body>
</html>
