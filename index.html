  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#11101f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Casa Nuova">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
  <title>Casa Nuova</title>
</head>
<body>
  <div class="phone-shell">
    <header class="hero">
      <div class="shine"></div>
      <div class="topbar">
        <span class="pill">🏠 Casa nuova</span>
        <button id="resetBtn" class="ghost" aria-label="Ripristina dati iniziali">↺</button>
      </div>
      <h1>Spese casa<br><span>senza ansia.</span></h1>
      <p class="subtitle">Lista acquisti smart, pensata per iPhone e uso veloce al supermercato.</p>
      <section class="stats-grid" aria-label="Riepilogo spese">
        <article class="stat primary"><small>Totale</small><strong id="totalAll">€0</strong></article>
        <article class="stat"><small>Comprato</small><strong id="totalBought">€0</strong></article>
        <article class="stat"><small>Da comprare</small><strong id="totalTodo">€0</strong></article>
      </section>
    </header>

    <main>
      <div class="search-card">
        <div class="search-row">
          <span>🔎</span>
          <input id="searchInput" placeholder="Cerca acquisto, categoria…" autocomplete="off">
        </div>
        <div class="filters" id="statusFilters">
          <button class="chip active" data-status="all">Tutto</button>
          <button class="chip" data-status="todo">Da comprare</button>
          <button class="chip" data-status="bought">Comprati</button>
        </div>
        <select id="categorySelect" aria-label="Filtra categoria"></select>
      </div>

      <div class="progress-card">
        <div><strong id="progressText">0%</strong><span> completato</span></div>
        <div class="progress"><i id="progressBar"></i></div>
      </div>

      <section id="list" class="list" aria-live="polite"></section>
      <p id="emptyState" class="empty hidden">Nessun acquisto trovato. Prova a cambiare filtro o aggiungine uno nuovo ✨</p>
    </main>
  </div>

  <button id="addBtn" class="fab" aria-label="Aggiungi acquisto">＋</button>

  <dialog id="itemDialog">
    <form id="itemForm" method="dialog" class="sheet">
      <div class="sheet-handle"></div>
      <h2 id="dialogTitle">Nuovo acquisto</h2>
      <label>Descrizione<input id="nameField" required placeholder="Es. Stendino, detersivo, lampada…"></label>
      <div class="two-cols">
        <label>Categoria<select id="categoryField"></select></label>
        <label>Quantità<input id="qtyField" type="number" min="1" step="1" value="1"></label>
      </div>
      <label>Prezzo unitario<input id="priceField" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0,00"></label>
      <label>Note<input id="notesField" placeholder="Negozio, marca, misura…"></label>
      <label class="toggle"><input id="boughtField" type="checkbox"><span>Già comprato</span></label>
      <menu>
        <button type="button" id="deleteBtn" class="danger hidden">Elimina</button>
        <button type="button" id="cancelBtn" class="ghost-dark">Annulla</button>
        <button value="default" class="save">Salva</button>
      </menu>
    </form>
  </dialog>
